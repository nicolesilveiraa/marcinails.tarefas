<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nails Marci - Relatórios</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="app-container">
        <header class="dashboard-header">
            <img src="logo.png.jpeg" alt="Logo Nails Marci" class="logo-small">
        </header>

        <section class="welcome-section">
            <h2 class="welcome-title">Olá <span id="report-user-name">Juliana</span>!</h2>
            <p class="tasks-counter">Confira seus relatórios abaixo:</p>
        </section>

        <section class="report-filter-wrapper">
            <div class="report-time-filters" id="report-time-filters">
                <button class="cat-filter" data-range="hoje">Hoje</button>
                <button class="cat-filter active" data-range="semana">Semana</button>
                <button class="cat-filter" data-range="mes">Mês</button>
            </div>
            
            <div class="month-select-box" id="month-select-container" style="display: none; margin-top: 10px;">
                <select id="report-month-select" class="report-dropdown">
                    <option value="0">Janeiro</option>
                    <option value="1">Fevereiro</option>
                    <option value="2">Março</option>
                    <option value="3">Abril</option>
                    <option value="4" selected>Maio</option>
                    <option value="5">Junho</option>
                    <option value="6">Julho</option>
                    <option value="7">Agosto</option>
                    <option value="8">Setembro</option>
                    <option value="9">Outubro</option>
                    <option value="10">Novembro</option>
                    <option value="11">Dezembro</option>
                </select>
            </div>
        </section>

        <section class="report-overview">
            <div class="report-card">
                <div class="report-card-text">
                    <h4 id="range-title">Sua Semana Atual</h4>
                    <p><span id="total-completed">0</span> tarefas concluídas</p>
                </div>
                <div class="report-card-icon">✓</div>
            </div>

            <div class="report-card">
                <div class="report-card-text">
                    <h4>Foco Principal</h4>
                    <p id="top-category">Nenhuma (0%)</p>
                </div>
            </div>
        </section>

        <section class="tasks-section" style="margin-top: 15px;">
            <h3 class="list-title" style="text-align: left;">Conclusão por Categoria</h3>
            <div class="divider"></div>
            
            <div id="analytics-bars-container">
                </div>
        </section>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-btn">
                <svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><line x1="9" y1="12" x2="15" y2="12"></line><line x1="9" y1="16" x2="15" y2="16"></line></svg>
            </a>
            <a href="agenda.html" class="nav-btn"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg></a>
            <a href="relatorios.html" class="nav-btn active"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg></a>
            <a href="perfil.html" class="nav-btn"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></a>
        </nav>
    </main>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js?v=7"></script>
<script src="js/relatorios.js?v=7"></script>
</body>
</html>
