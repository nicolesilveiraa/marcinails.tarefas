<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nails Marci - Login</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="auth-container">
        <header class="logo-box">
            <img src="logo.png.jpeg" alt="Logo Nails Marci" class="logo-image">
        </header>
        
        <h1 class="auth-title">Login</h1>
        
        <form class="auth-form" id="login-form">
            <div class="input-group">
                <input type="email" id="login-email" placeholder="Digite seu E-mail" required>
            </div>

            <div class="input-group">
                <input type="password" id="login-password" placeholder="Digite sua senha" required>
            </div>
            
            <button type="submit" class="btn-primary">Entrar</button>
        </form>
        
        <div class="auth-footer">
            <a href="cadastro.html" class="auth-link">Cadastre-se</a>
        </div>
    </main>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js?v=7"></script>
<script src="js/login.js?v=7"></script>
</body>
</html>
