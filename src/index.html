<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nails Marci - Tarefas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Olá, Juliana!</h1>
        <div id="contagem" class="status-count">6 tarefas para hoje</div>
    </header>

    <div class="filters">
        <button class="filter-btn active">Todas</button>
        <button class="filter-btn">Estoque</button>
        <button class="filter-btn">Marketing</button>
    </div>

    <main id="lista-tarefas">
        <div class="task-item" onclick="toggleTarefa(this)">
            <span>Preparar kit da cliente das 14h</span>
            <span class="tag tag-atendimento">Atendimento</span>
        </div>
        <div class="task-item" onclick="toggleTarefa(this)">
            <span>Comprar top coat que acabou</span>
            <span class="tag tag-estoque">Estoque</span>
        </div>
        <div class="task-item" onclick="toggleTarefa(this)">
            <span>Tirar materiais da autoclave</span>
            <span class="tag tag-esterilizacao">Esterilização</span>
        </div>
    </header>

    <div class="fab" onclick="adicionarNovaTarefa()">+</div>

    <footer>
        <a href="#" class="nav-icon active">📋</a>
        <a href="#" class="nav-icon">📅</a>
        <a href="#" class="nav-icon">📊</a>
        <a href="#" class="nav-icon">👤</a>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
