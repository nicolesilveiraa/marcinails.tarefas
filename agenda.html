<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nails Marci - Agenda</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="app-container">
        <header class="dashboard-header">
            <img src="logo.png.jpeg" alt="Logo Nails Marci" class="logo-small">
        </header>

        <section class="welcome-section">
            <h2 class="welcome-title">Olá <span id="agenda-user-name">Juliana</span>! Sua Agenda:</h2>
        </section>

        <section class="calendar-container">
            <div class="calendar-header">
                <button class="cal-arrow" id="prev-month">&lt;</button>
                <span class="calendar-month-year" id="month-year-display">Maio 2026</span>
                <button class="cal-arrow" id="next-month">&gt;</button>
            </div>
            
            <div class="calendar-weekdays">
                <div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div><div>Dom</div>
            </div>
            
            <div class="calendar-days" id="calendar-days-grid"></div>
        </section>

        <section class="tasks-section" style="margin-top: 25px;">
            <h3 class="list-title" id="selected-date-title">Tarefas do Dia</h3>
            <div class="divider"></div>
            <div id="agenda-tasks-container" class="tasks-container"></div>
        </section>

        <nav class="bottom-nav">
            <a href="dashboard.html" class="nav-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    <line x1="9" y1="12" x2="15" y2="12"></line>
                    <line x1="9" y1="16" x2="15" y2="16"></line>
                </svg>
            </a>
            <a href="agenda.html" class="nav-btn active">
                <svg viewBox="0 0 24 24">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
            </a>
            <a href="relatorios.html" class="nav-btn">
                <svg viewBox="0 0 24 24">
                    <line x1="18" y1="20" x2="18" y2="10"></line>
                    <line x1="12" y1="20" x2="12" y2="4"></line>
                    <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
            </a>
            <a href="perfil.html" class="nav-btn">
                <svg viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </a>
        </nav>
    </main>

    <div class="modal-overlay" id="card-details-modal">
        <div class="modal-card card-trello-style">
            <button class="modal-close" id="close-details-btn">X</button>
            
            <h3 class="trello-card-title" id="details-card-title">Nome da Tarefa</h3>
            <span class="trello-card-subtitle" id="details-card-category">Categoria</span>
            
            <div class="trello-sections-container">
                <div class="trello-section">
                    <div class="trello-header-with-plus">
                        <label class="trello-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                            <span>Descrição</span>
                        </label>
                        <span class="trello-plus-indicator">+</span>
                    </div>
                    <textarea id="details-desc-input" class="trello-textarea" placeholder="Adicionar uma descrição mais detalhada..."></textarea>
                </div>

                <div class="trello-section">
                    <div class="trello-header-with-plus">
                        <label class="trello-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><circle cx="7" cy="7" r="1"></circle></svg>
                            <span>Etiquetas</span>
                        </label>
                    </div>
                    <button class="trello-action-btn" style="text-align: left;" onclick="alert('Seletor de cores em breve!')">+ Adicionar etiqueta</button>
                </div>

                <div class="trello-row">
                    <div class="trello-col">
                        <div class="trello-header-with-plus">
                            <label class="trello-label">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                <span>Início</span>
                            </label>
                            <span class="trello-plus-indicator">+</span>
                        </div>
                        <input type="date" id="details-start-date" class="trello-date-input">
                    </div>
                    <div class="trello-col">
                        <div class="trello-header-with-plus">
                            <label class="trello-label">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                                <span>Entrega</span>
                            </label>
                            <span class="trello-plus-indicator">+</span>
                        </div>
                        <input type="date" id="details-end-date" class="trello-date-input">
                    </div>
                </div>

                <div class="trello-section">
                    <div class="trello-header-with-plus">
                        <label class="trello-label">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                            <span>Anexos</span>
                        </label>
                    </div>
                    <div class="trello-attachment-zone">
                        <button class="trello-action-btn" id="trigger-file-upload" style="width: 100%; text-align: left;">+ Adicionar Anexo ou Foto</button>
                        <input type="file" id="trello-card-file" accept="image/*" style="display: none;">
                    </div>
                    <div id="attachments-list-container" style="margin-top: 10px;"></div>
                </div>
            </div>

            <div class="modal-actions" style="margin-top: 25px;">
                <button class="btn-modal-save" id="save-details-btn" style="width: 100%;">SALVAR DETALHES</button>
            </div>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabaseClient.js?v=7"></script>
<script src="js/agenda.js?v=7"></script>
</body>
</html>
